apiVersion: v1
kind: Service
metadata:
  name: devopsapp-service
spec:
  type: NodePort
  selector:
    app: devopsapp   # ✅ FIXED (matches deployment)
  ports:
    - name: http
      port: 8080        # service port
      targetPort: 8080  # container port
      nodePort: 32222   # external access port

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsapp-deployment
  labels:
    app: devopsapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devopsapp
  template:
    metadata:
      labels:
        app: devopsapp
    spec:
      containers:
      - name: devopsapp
        image: image_name   # 🔁 replace with your real image
        ports:
        - containerPort: 8080
